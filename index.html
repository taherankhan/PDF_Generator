<body id="kt_body" class="page-loading">
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Theme -->
    <script>
        let themeMode = "system";
        if (localStorage.getItem("kt_theme_mode_value")) {
            themeMode = localStorage.getItem("kt_theme_mode_value");
        }

        if (themeMode === "system") {
            themeMode = window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
        }

        document.documentElement.setAttribute("data-bs-theme", themeMode);
    </script>

    <div id="root"></div>

    <!-- Splash -->
    <div id="splash-screen" class="splash-screen">
        <div class="loading-container">
            <div class="loading-text">
                <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
            </div>

            <div class="loading-percentage">0%</div>

            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="root-modals"></div>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            let currentPercentage = 0;

            tl.to('.loading-text', {
                opacity: 1,
                scale: 1,
                duration: 0.5,
                ease: 'back.out(1.7)'
            })
            .to('.loading-text span', {
                opacity: 1,
                y: 0,
                stagger: 0.12,
                duration: 0.6,
                ease: 'power2.out'
            }, '-=0.2')
            .to('.loading-percentage', {
                opacity: 1,
                duration: 0.3
            }, '-=0.3')
            .to('.progress-container', {
                opacity: 1,
                duration: 0.4
            }, '-=0.2')
            .to('.progress-bar', {
                width: '100%',
                duration: 0.4,
                ease: 'power2.inOut',
                onUpdate: function () {
                    const progress = this.progress();
                    currentPercentage = Math.round(progress * 100);

                    const percentageEl = document.querySelector('.loading-percentage');

                    if (percentageEl) {
                        percentageEl.textContent = currentPercentage + '%';
                    }
                }
            }, '-=0.1')
            .to('.loading-text', {
                scale: 1.2,
                opacity: 0,
                duration: 0.2,
                ease: 'power2.in'
            }, '-=0.1')
            .to(['.loading-percentage', '.progress-container'], {
                opacity: 0,
                duration: 0.15,
                ease: 'power2.in'
            }, '-=0.2')
            .to('.splash-screen', {
                opacity: 0,
                duration: 0.2,
                ease: 'power2.inOut',
                onComplete: () => {
                    const splashScreen = document.getElementById('splash-screen');

                    if (splashScreen) {
                        splashScreen.style.display = 'none';
                    }
                }
            });
        });
    </script>

    <script type="module" src="/src/main.tsx"></script>
