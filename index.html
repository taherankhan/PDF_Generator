<body id="kt_body" class="page-loading">

    <!-- =============================================
         THEME DETECTION (runs before paint to avoid flash)
    ============================================= -->
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('kt_theme_mode_value');
                var theme = stored || 'system';
                if (theme === 'system') {
                    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-bs-theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <!-- App Root -->
    <div id="root" role="main" aria-label="MD2PDFX Application"></div>

    <!-- =============================================
         SPLASH / LOADING SCREEN
    ============================================= -->
    <div
        id="splash-screen"
        class="splash-screen"
        role="progressbar"
        aria-label="Loading MD2PDFX"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
    >
        <div class="loading-container">
            <div class="loading-text" aria-hidden="true">
                <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
            </div>
            <div class="loading-percentage" aria-hidden="true">0%</div>
            <div class="progress-container" aria-hidden="true">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Modal Root -->
    <div id="root-modals" aria-live="polite"></div>

    <!-- =============================================
         GSAP (Splash animation)
    ============================================= -->
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
        integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    ></script>

    <script>
        (function () {
            var splashEl = document.getElementById('splash-screen');
            var percentageEl = document.querySelector('.loading-percentage');

            function updateAria(val) {
                if (splashEl) splashEl.setAttribute('aria-valuenow', val);
            }

            if (typeof gsap === 'undefined') {
                // Fallback: hide splash immediately if GSAP fails to load
                if (splashEl) splashEl.style.display = 'none';
                return;
            }

            window.addEventListener('DOMContentLoaded', function () {
                var tl = gsap.timeline();

                tl.to('.loading-text', {
                    opacity: 1,
                    scale: 1,
                    duration: 0.5,
                    ease: 'back.out(1.7)'
                })
                .to('.loading-text span', {
                    opacity: 1,
                    y: 0,
                    stagger: 0.1,
                    duration: 0.55,
                    ease: 'power2.out'
                }, '-=0.2')
                .to('.loading-percentage', {
                    opacity: 1,
                    duration: 0.3
                }, '-=0.3')
                .to('.progress-container', {
                    opacity: 1,
                    duration: 0.35
                }, '-=0.2')
                .to('.progress-bar', {
                    width: '100%',
                    duration: 0.55,
                    ease: 'power2.inOut',
                    onUpdate: function () {
                        var pct = Math.round(this.progress() * 100);
                        if (percentageEl) percentageEl.textContent = pct + '%';
                        updateAria(pct);
                    }
                }, '-=0.1')
                .to('.loading-text', {
                    scale: 1.2,
                    opacity: 0,
                    duration: 0.2,
                    ease: 'power2.in'
                }, '-=0.1')
                .to(['.loading-percentage', '.progress-container'], {
                    opacity: 0,
                    duration: 0.15,
                    ease: 'power2.in'
                }, '-=0.2')
                .to('.splash-screen', {
                    opacity: 0,
                    duration: 0.25,
                    ease: 'power2.inOut',
                    onComplete: function () {
                        if (splashEl) {
                            splashEl.style.display = 'none';
                            splashEl.setAttribute('aria-hidden', 'true');
                        }
                    }
                });
            });
        })();
    </script>
