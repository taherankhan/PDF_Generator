<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="x-ua-compatible" content="ie=edge" />
        <meta name="author" content="PDF Generator" />
        <meta name="theme-color" content="#6c63ff" />
        <meta name="description" content="PDF Generator — The fastest Markdown to PDF converter. Live editor, real-time preview, 5 beautiful themes. 100% free, no sign-up, runs in your browser." />
        <title>PDF Generator — Markdown to Beautiful PDF, Instantly</title>
        <link rel="stylesheet" id="layout-styles-anchor" href="/splash-screen.css" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="shortcut icon" href="/favicon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />

        <!-- Open Graph / social -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="PDF Generator - Markdown to PDF" />
        <meta property="og:description" content="Convert Markdown to PDF with beautiful themes" />
        <meta property="og:image" content="/favicon.svg" />

        <meta name="apple-mobile-web-app-title" content="PDF Generator" />
        <link rel="manifest" href="/site.webmanifest" />
    </head>
    <body id="kt_body" class="page-loading">
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <!--begin::Theme mode setup on page load-->
        <script>
            let themeMode = "system";
            if (localStorage.getItem("kt_theme_mode_value")) {
                themeMode = localStorage.getItem("kt_theme_mode_value");
            }
            if (themeMode === "system") {
                themeMode = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            }
            document.documentElement.setAttribute("data-bs-theme", themeMode);
        </script>
        <!--end::Theme mode setup on page load-->
        <div id="root"></div>
        <!--begin::Loading markup-->
        <div id="splash-screen" class="splash-screen">
            <div class="loading-container">
                <div class="loading-text">
                    <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
                </div>
                <div class="loading-percentage">0%</div>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
            </div>
        </div>
        <!--end::Loading markup-->
        <div id="root-modals"></div>
        
        <!-- GSAP for animations -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
        <script>
            // GSAP Animation for Splash Screen with Percentage Counter
            window.addEventListener('DOMContentLoaded', () => {
                const tl = gsap.timeline();
                let currentPercentage = 0;
                
                // Animate letters one by one (slower)
                tl.to('.loading-text', {
                    opacity: 1,
                    scale: 1,
                    duration: 0.5,
                    ease: 'back.out(1.7)'
                })
                .to('.loading-text span', {
                    opacity: 1,
                    y: 0,
                    stagger: 0.12,
                    duration: 0.6,
                    ease: 'power2.out'
                }, '-=0.2')
                .to('.loading-percentage', {
                    opacity: 1,
                    duration: 0.3
                }, '-=0.3')
                .to('.progress-container', {
                    opacity: 1,
                    duration: 0.4
                }, '-=0.2')
                .to('.progress-bar', {
                    width: '100%',
                    duration: 0.4,
                    ease: 'power2.inOut',
                    onUpdate: function() {
                        // Update percentage counter as progress bar fills
                        const progress = this.progress();
                        currentPercentage = Math.round(progress * 100);
                        const percentageEl = document.querySelector('.loading-percentage');
                        if (percentageEl) {
                            percentageEl.textContent = currentPercentage + '%';
                        }
                    }
                }, '-=0.1')
                // Hold for a moment before fading out
                .to('.splash-screen', {
                    opacity: 1,
                    duration: 0.1
                })
                // Scale up and fade out the loading text
                .to('.loading-text', {
                    scale: 1.2,
                    opacity: 0,
                    duration: 0.2,
                    ease: 'power2.in'
                }, '-=0.1')
                .to(['.loading-percentage', '.progress-container'], {
                    opacity: 0,
                    duration: 0.15,
                    ease: 'power2.in'
                }, '-=0.2')
                .to('.splash-screen', {
                    opacity: 0,
                    duration: 0.2,
                    ease: 'power2.inOut',
                    onComplete: () => {
                        const splashScreen = document.getElementById('splash-screen');
                        if (splashScreen) {
                            splashScreen.style.display = 'none';
                        }
                    }
                });
            });
        </script>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
