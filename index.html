<body id="kt_body" class="page-loading">
    <noscript>

    <!-- =============================================
         THEME DETECTION (runs before paint to avoid flash)
    ============================================= -->
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('kt_theme_mode_value');
                var theme = stored || 'system';
                if (theme === 'system') {
                    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-bs-theme', theme);
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <!-- App Root -->
    <div id="root" role="main" aria-label="MD2PDFX Application"></div>

    <!-- =============================================
         SPLASH / LOADING SCREEN
    ============================================= -->
    <div
        id="splash-screen"
        class="splash-screen"
        role="progressbar"
        aria-label="Loading MD2PDFX"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
    >
        <div class="loading-container">
            <div class="loading-text" aria-hidden="true">
                <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
            </div>
            <div class="loading-percentage" aria-hidden="true">0%</div>
            <div class="progress-container" aria-hidden="true">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Modal Root -->
    <div id="root-modals" aria-live="polite"></div>

    <!-- Lightweight splash dismiss (no GSAP — improves LCP/TBT on mobile) -->
    <script>
        (function () {
            var splashEl = document.getElementById('splash-screen');
            function hideSplash() {
                if (window.__md2pdfxSplashDismissed) return;
                window.__md2pdfxSplashDismissed = true;
                if (!splashEl) return;
                splashEl.style.transition = 'opacity 0.2s ease-out';
                splashEl.style.opacity = '0';
                var done = function () {
                    splashEl.style.display = 'none';
                    splashEl.setAttribute('aria-hidden', 'true');
                    document.body.classList.remove('page-loading');
                };
                splashEl.addEventListener('transitionend', done, { once: true });
                setTimeout(done, 250);
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', hideSplash);
            } else {
                hideSplash();
            }
        })();
    </script>
