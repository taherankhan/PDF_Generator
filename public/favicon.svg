<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- M glyph (Markdown) -->
  <path d="M8 44V20l8 12 8-12v24" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Arrow → -->
  <path d="M30 32h6M33 29l3 3-3 3" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PDF Document icon -->
  <rect x="41" y="19" width="15" height="19" rx="2.5" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.8"/>
  <path d="M41 24.5h15" stroke="white" stroke-width="1.2" stroke-opacity="0.6"/>
  <path d="M44 29h9M44 32.5h7M44 36h9" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- PDF label badge -->
  <rect x="39" y="36" width="18" height="8" rx="2" fill="white"/>
  <text x="48" y="43" font-family="Arial, sans-serif" font-size="5.5" font-weight="800" fill="#4f46e5" text-anchor="middle" letter-spacing="0.3">PDF</text>
</svg>
